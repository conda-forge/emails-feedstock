{% set name = "emails" %}
{% set version = "1.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f2ac9d73d84e83d7f1a3924837fa15b59c0bce9bf658ac3b0b80398bc6d8b57d

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - dkimpy
    - python-dateutil
    - puremagic
    # NOTE: these are in the "html" extra, split into own package later
    - chardet
    - cssutils
    - lxml
    - premailer
    - requests
    # NOTE: in "jinja" extra
    - jinja2
    # NOTE: in async extra
    # - aiosmtplib

test:
  requires:
    - python {{ python_min }}
  imports:
    - emails
    - emails.compat
    - emails.loader
    - emails.store
    - emails.template
    - emails.message
    - emails.signers
    - emails.transformer
    - emails.utils

about:
  home: https://github.com/lavr/python-emails/
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: 'Modern python library for emails '

  description: |
    Modern python library for emails 
  dev_url: https://github.com/lavr/python-emails

extra:
  recipe-maintainers:
    - timkpaine
